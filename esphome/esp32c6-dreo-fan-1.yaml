esphome:
  name: esp32c6-dreo-fan-1
  friendly_name: Dreo Fan IR (ESP32C6 1)

esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf   # required for C6; arduino-on-C6 lags upstream

logger:

api:
  encryption:
    key: !secret esp32c6_dreo_fan_1_api_key

ota:
  - platform: esphome
    password: !secret esp32c6_dreo_fan_1_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "esp32c6-dreo-fan-1 Fallback"

# IR LED on D10 (GPIO18 on the XIAO C6 silkscreen mapping). Carrier = 38 kHz,
# duty 33% — matches Flipper-captured signal.
remote_transmitter:
  pin: GPIO18
  carrier_duty_percent: 33

